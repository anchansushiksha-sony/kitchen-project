{% extends "core/base.html" %}

{% block content %}


<div class="container py-5">
    <h2 class="text-center fw-bold mb-4">Shop by Category</h2>

    <div class="row g-4">
        {% for category in categories %}
        <div class="col-6 col-md-4 col-lg-3">
            <div class="card h-100 shadow-sm border-0">
                {% if category.image %}
                    <img src="{{ category.image.url }}" class="card-img-top" style="height:200px; object-fit:cover;">
                {% else %}
                    <div class="bg-light d-flex align-items-center justify-content-center" style="height:200px;">
                        No Image
                    </div>
                {% endif %}

                <div class="card-body text-center">
                    <h5 class="fw-semibold">{{ category.name }}</h5>
                    <p class="text-muted small">
                        {{ category.products.count }} products
                    </p>
<a href="{% url 'category_products' category.id %}" class="btn btn-warning btn-sm">
                        View Products
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
