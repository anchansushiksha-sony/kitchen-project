{% extends "core/base.html" %}
{% block content %}

<div class="container my-5">
  <div class="row g-4">

    <!-- LEFT -->
    <div class="col-12 col-lg-7">
      <div class="card p-4 shadow-sm">
        <h5 class="fw-bold mb-3">Delivery Address</h5>

        <form method="post" id="checkout-form">
          {% csrf_token %}

          <input type="hidden" name="payment_method" id="payment_method" value="COD">

          <div class="mb-3">
            <label>Full Name</label>
            <input type="text" class="form-control" name="name" required>
          </div>

          <div class="mb-3">
            <label>Mobile</label>
            <input type="tel" class="form-control" name="phone" required>
          </div>

          <div class="mb-3">
            <label>Address</label>
            <textarea class="form-control" name="address" required></textarea>
          </div>
        </form>
      </div>
    </div>

    <!-- RIGHT -->

    <div class="col-12 col-lg-5">
      <div class="card p-4 shadow-sm sticky-top" style="top:100px;">
        <h5 class="fw-bold mb-3">Order Summary</h5>

        <div class="d-flex justify-content-between">
          <span>Subtotal</span>
          <strong>₹{{ total }}</strong>
        </div>

        <div class="d-flex justify-content-between mt-2">
          <span>Delivery</span>
          <span class="text-success">FREE</span>
        </div>

        <hr>

        <div class="d-flex justify-content-between fs-5">
          <strong>Total</strong>
          <strong>₹{{ total }}</strong>
        </div>

        <button class="btn btn-warning w-100 mt-4"
                onclick="placeCOD()">Place Order (COD)</button>

        <button class="btn btn-dark w-100 mt-3"
                onclick="payOnline()">Pay Online</button>
      </div>
    </div>

  </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
function placeCOD(){
    document.getElementById("payment_method").value = "COD";
    document.getElementById("checkout-form").submit();
}

function payOnline(){
    fetch("{% url 'create_payment' %}")
    .then(res => res.json())
    .then(order => {
        var options = {
            "key": "{{ RAZORPAY_KEY_ID }}",
            "amount": order.amount,
            "currency": "INR",
            "order_id": order.id,
            "handler": function (response) {
                fetch("{% url 'verify_payment' %}", {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": "{{ csrf_token }}",
                        "Content-Type": "application/x-www-form-urlencoded"
                    },
                    body: "razorpay_payment_id=" + response.razorpay_payment_id
                }).then(() => window.location.href = "/order-success/");
            }
        };
        new Razorpay(options).open();
    });
}
</script>

{% endblock %}
